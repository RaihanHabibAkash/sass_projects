<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sass Grid Layout</title>
  <link rel="stylesheet" href="css_Grid_Generator.css">
</head>
<body>

  <!-- Full width -->
  <div class="row">
    <div class="col-12">col-12 (full width)</div>
  </div>

  <!-- Two equal halves -->
  <div class="row">
    <div class="col-6">col-6</div>
    <div class="col-6">col-6</div>
  </div>

  <!-- Three equal columns -->
  <div class="row">
    <div class="col-4">col-4</div>
    <div class="col-4">col-4</div>
    <div class="col-4">col-4</div>
  </div>

  <!-- Sidebar + content -->
  <div class="row">
    <div class="col-3">col-3 (sidebar)</div>
    <div class="col-9">col-9 (content)</div>
  </div>

  <!-- Mixed columns -->
  <div class="row">
    <div class="col-2">col-2</div>
    <div class="col-4">col-4</div>
    <div class="col-6">col-6</div>
  </div>

</body>
</html>
